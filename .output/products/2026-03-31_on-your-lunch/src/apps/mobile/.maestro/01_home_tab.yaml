appId: com.onyourmark.onyourlunch
---
# 홈 탭 검증
- launchApp:
    clearState: true

# 앱 시작 후 로딩 대기
- extendedWaitUntil:
    visible: "온유어런치"
    timeout: 15000

# 앱 바 확인
- assertVisible: "온유어런치"

# 인사말 확인
- assertVisible: "오늘 점심 뭐 먹을까요?"

# 카테고리 칩 확인
- assertVisible: "전체"
- assertVisible: "한식"

# 추천 카드 확인 (식당명이 보이면 API 연동 성공)
- assertVisible: "도보"

# 스크롤 테스트
- scroll

# 새로고침 버튼 확인
- assertVisible: "다른 추천 보기"

- takeScreenshot: "home_tab_verified"
