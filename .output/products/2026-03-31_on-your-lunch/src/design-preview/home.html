<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=390, initial-scale=1.0">
  <title>온유어런치 — 홈</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <script>
    tailwindcss.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Pretendard Variable', '-apple-system', 'system-ui', 'sans-serif'] },
          colors: {
            primary: { DEFAULT: '#FF6B35', hover: '#E55A2B', disabled: '#FFB899' },
            bg: { primary: '#FFFFFF', secondary: '#F9FAFB', tertiary: '#F3F4F6' },
            text: { primary: '#111827', secondary: '#6B7280', placeholder: '#9CA3AF', inverse: '#FFFFFF' },
            border: { default: '#E5E7EB', focus: '#FF6B35' },
          }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Pretendard Variable', -apple-system, system-ui, sans-serif; }
    body { margin: 0; background: #F9FAFB; word-break: keep-all; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div style="width: 390px; margin: 0 auto; min-height: 844px; background: #F9FAFB; display: flex; flex-direction: column; position: relative;">

    <!-- Status Bar -->
    <div class="h-11 bg-white flex items-center justify-between px-6 text-xs font-semibold text-text-primary">
      <span>9:41</span>
      <div class="flex items-center gap-1">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><rect x="0" y="4" width="3" height="8" rx="1"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1"/><rect x="9" y="1" width="3" height="11" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="0.7"/></svg>
        <svg width="24" height="12" viewBox="0 0 24 12" fill="none" stroke="currentColor" stroke-width="1"><rect x="0.5" y="0.5" width="21" height="11" rx="2"/><rect x="22" y="3.5" width="1.5" height="5" rx="0.5" fill="currentColor"/><rect x="2" y="2" width="16" height="8" rx="1" fill="#34C759" stroke="none"/></svg>
      </div>
    </div>

    <!-- App Bar -->
    <div class="h-14 bg-white flex items-center justify-between px-4">
      <span class="text-xl font-bold text-primary">온유어런치</span>
      <div class="w-11 h-11 rounded-full bg-bg-secondary flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 256 256" fill="none" stroke="#6B7280" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><path d="M56,104a72,72,0,0,1,144,0c0,35.82,8.3,64.6,14.9,76A8,8,0,0,1,208,192H48a8,8,0,0,1-6.88-12C47.71,168.6,56,139.81,56,104Z"/><path d="M96,192v8a32,32,0,0,0,64,0v-8"/></svg>
      </div>
    </div>

    <!-- Greeting -->
    <div class="bg-white px-4 py-3">
      <h1 class="text-2xl font-bold text-text-primary leading-tight" style="text-wrap: balance;">지수님,<br>오늘 점심 뭐 먹을까요?</h1>
    </div>

    <!-- Filter: Category Chips -->
    <div class="bg-white pt-3 pb-2">
      <div class="flex gap-2 px-4 overflow-x-auto no-scrollbar">
        <button class="shrink-0 px-4 py-2 rounded-full bg-primary text-white text-sm font-medium">전체</button>
        <button class="shrink-0 px-4 py-2 rounded-full bg-bg-tertiary text-text-secondary text-sm font-medium hover:bg-gray-200 transition">한식</button>
        <button class="shrink-0 px-4 py-2 rounded-full bg-bg-tertiary text-text-secondary text-sm font-medium hover:bg-gray-200 transition">중식</button>
        <button class="shrink-0 px-4 py-2 rounded-full bg-bg-tertiary text-text-secondary text-sm font-medium hover:bg-gray-200 transition">일식</button>
        <button class="shrink-0 px-4 py-2 rounded-full bg-bg-tertiary text-text-secondary text-sm font-medium hover:bg-gray-200 transition">양식</button>
        <button class="shrink-0 px-4 py-2 rounded-full bg-bg-tertiary text-text-secondary text-sm font-medium hover:bg-gray-200 transition">아시안</button>
        <button class="shrink-0 px-4 py-2 rounded-full bg-bg-tertiary text-text-secondary text-sm font-medium hover:bg-gray-200 transition">분식</button>
        <button class="shrink-0 px-4 py-2 rounded-full bg-bg-tertiary text-text-secondary text-sm font-medium hover:bg-gray-200 transition">샐러드</button>
      </div>
    </div>

    <!-- Filter: Sub Filters -->
    <div class="bg-white px-4 pb-3 flex gap-3">
      <!-- Walk Distance -->
      <div class="flex bg-bg-tertiary rounded-lg p-0.5">
        <button class="px-3 py-1.5 text-xs font-medium text-text-secondary rounded-md">5분</button>
        <button class="px-3 py-1.5 text-xs font-medium text-primary bg-white rounded-md shadow-sm">10분</button>
        <button class="px-3 py-1.5 text-xs font-medium text-text-secondary rounded-md">15분</button>
      </div>
      <!-- Price Range -->
      <div class="flex bg-bg-tertiary rounded-lg p-0.5">
        <button class="px-3 py-1.5 text-xs font-medium text-text-secondary rounded-md">~1만</button>
        <button class="px-3 py-1.5 text-xs font-medium text-text-secondary rounded-md">1~2만</button>
        <button class="px-3 py-1.5 text-xs font-medium text-text-secondary rounded-md">2만~</button>
      </div>
    </div>

    <!-- Divider -->
    <div class="h-px bg-border-default"></div>

    <!-- Cards -->
    <div class="flex-1 overflow-y-auto px-4 pt-4 pb-4 space-y-3">

      <!-- Card 1 -->
      <div class="bg-white rounded-xl border border-border-default overflow-hidden">
        <div class="h-40 bg-orange-50 flex items-center justify-center">
          <img src="https://images.unsplash.com/photo-1567521464027-f127ff144326?w=400&h=200&fit=crop" class="w-full h-full object-cover" alt="한식" loading="lazy">
        </div>
        <div class="p-4">
          <div class="flex items-center justify-between">
            <span class="text-lg font-semibold text-text-primary">을지로 골목식당</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 256 256" fill="none" stroke="#9CA3AF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><path d="M128,216S28,160,28,92A52,52,0,0,1,128,72,52,52,0,0,1,228,92C228,160,128,216,128,216Z"/></svg>
          </div>
          <p class="text-sm text-text-secondary mt-1.5" style="font-variant-numeric: tabular-nums;">한식 · 도보 8분 · ~1만원</p>
        </div>
      </div>

      <!-- Card 2 -->
      <div class="bg-white rounded-xl border border-border-default overflow-hidden">
        <div class="h-40 bg-red-50 flex items-center justify-center">
          <img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=400&h=200&fit=crop" class="w-full h-full object-cover" alt="양식" loading="lazy">
        </div>
        <div class="p-4">
          <div class="flex items-center justify-between">
            <span class="text-lg font-semibold text-text-primary">파스타공방</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 256 256" fill="none" stroke="#9CA3AF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><path d="M128,216S28,160,28,92A52,52,0,0,1,128,72,52,52,0,0,1,228,92C228,160,128,216,128,216Z"/></svg>
          </div>
          <p class="text-sm text-text-secondary mt-1.5" style="font-variant-numeric: tabular-nums;">양식 · 도보 5분 · ~1.5만원</p>
        </div>
      </div>

      <!-- Card 3 -->
      <div class="bg-white rounded-xl border border-border-default overflow-hidden">
        <div class="h-40 bg-blue-50 flex items-center justify-center">
          <img src="https://images.unsplash.com/photo-1579871494447-9811cf80d66c?w=400&h=200&fit=crop" class="w-full h-full object-cover" alt="일식" loading="lazy">
        </div>
        <div class="p-4">
          <div class="flex items-center justify-between">
            <span class="text-lg font-semibold text-text-primary">스시히로</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 256 256" fill="none" stroke="#9CA3AF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><path d="M128,216S28,160,28,92A52,52,0,0,1,128,72,52,52,0,0,1,228,92C228,160,128,216,128,216Z"/></svg>
          </div>
          <p class="text-sm text-text-secondary mt-1.5" style="font-variant-numeric: tabular-nums;">일식 · 도보 10분 · ~2만원</p>
        </div>
      </div>

      <!-- Refresh Button -->
      <button class="w-full h-12 rounded-lg bg-bg-secondary border border-border-default flex items-center justify-center gap-2 hover:bg-bg-tertiary transition">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 256 256" fill="none" stroke="#FF6B35" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><polyline points="176 40 224 40 224 88"/><path d="M224,40,173.66,90.34a80,80,0,1,0,0,75.32"/></svg>
        <span class="text-sm font-medium text-text-secondary">다른 추천 보기 (4/5)</span>
      </button>

    </div>

    <!-- Bottom Tab Bar -->
    <div class="bg-white border-t border-border-default px-6 pt-2 pb-7 flex justify-between">
      <div class="flex flex-col items-center gap-0.5">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 256 256" fill="#FF6B35" stroke="#FF6B35" stroke-width="16"><path d="M218.83,103.77l-80-75.48a1.14,1.14,0,0,1-.11-.11,16,16,0,0,0-21.53,0l-.11.11L37.17,103.77A16,16,0,0,0,32,115.55V208a16,16,0,0,0,16,16H96a16,16,0,0,0,16-16V160h32v48a16,16,0,0,0,16,16h48a16,16,0,0,0,16-16V115.55A16,16,0,0,0,218.83,103.77Z"/></svg>
        <span class="text-[11px] font-medium text-primary">홈</span>
      </div>
      <div class="flex flex-col items-center gap-0.5">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 256 256" fill="none" stroke="#9CA3AF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><circle cx="116" cy="116" r="84"/><line x1="175.4" y1="175.4" x2="224" y2="224"/></svg>
        <span class="text-[11px] font-medium text-text-placeholder">탐색</span>
      </div>
      <div class="flex flex-col items-center gap-0.5">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 256 256" fill="none" stroke="#9CA3AF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><rect x="40" y="40" width="176" height="176" rx="8"/><line x1="176" y1="24" x2="176" y2="56"/><line x1="80" y1="24" x2="80" y2="56"/><line x1="40" y1="88" x2="216" y2="88"/></svg>
        <span class="text-[11px] font-medium text-text-placeholder">이력</span>
      </div>
      <div class="flex flex-col items-center gap-0.5">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 256 256" fill="none" stroke="#9CA3AF" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><circle cx="128" cy="96" r="64"/><path d="M32,216c19.37-33.47,54.55-56,96-56s76.63,22.53,96,56"/></svg>
        <span class="text-[11px] font-medium text-text-placeholder">마이</span>
      </div>
    </div>

  </div>
</body>
</html>
