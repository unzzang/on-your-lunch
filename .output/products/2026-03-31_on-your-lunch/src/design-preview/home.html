<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=393, initial-scale=1.0">
  <title>온유어런치 — 홈</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/regular/style.css">
  <link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.0.3/src/fill/style.css">
  <style>
    :root {
      --color-primary: #D4501F;
      --color-primary-hover: #B8441A;
      --color-primary-disabled: #E8A78E;
      --color-secondary: #6B7280;
      --color-destructive: #DC2626;
      --color-success: #16A34A;
      --color-bg-primary: #FFFFFF;
      --color-bg-secondary: #F9FAFB;
      --color-bg-tertiary: #F3F4F6;
      --color-border-default: #E5E7EB;
      --color-border-focus: #D4501F;
      --color-text-primary: #111827;
      --color-text-secondary: #6B7280;
      --color-text-placeholder: #9CA3AF;
      --color-text-inverse: #FFFFFF;
      --color-overlay: rgba(0,0,0,0.5);
      --color-toast-bg: #1F2937;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-full: 9999px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px rgba(0,0,0,0.07);
      --shadow-lg: 0 10px 15px rgba(0,0,0,0.10);
      --color-category-korean: #FF8C00;
      --color-category-chinese: #FF0000;
      --color-category-japanese: #0066FF;
      --color-category-western: #00AA00;
      --color-category-asian: #9900CC;
      --color-category-snack: #FFCC00;
      --color-category-salad: #66CC00;
      --color-rating: #FBBF24;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard Variable', -apple-system, system-ui, sans-serif; }
    body { background: var(--color-bg-secondary); word-break: keep-all; }
    .phone { width: 393px; margin: 0 auto; min-height: 852px; background: var(--color-bg-secondary); display: flex; flex-direction: column; position: relative; overflow: hidden; }

    /* Status Bar */
    .status-bar { height: 44px; background: var(--color-bg-primary); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; font-size: 14px; font-weight: 600; color: var(--color-text-primary); }

    /* App Bar */
    .app-bar { height: 56px; background: var(--color-bg-primary); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
    .app-bar__logo { font-size: 20px; font-weight: 700; color: var(--color-primary); }
    .app-bar__icon { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .app-bar__icon i { font-size: 24px; color: var(--color-text-secondary); }

    /* Greeting */
    .greeting { background: var(--color-bg-primary); padding: 12px 16px; }
    .greeting h1 { font-size: 24px; font-weight: 700; color: var(--color-text-primary); line-height: 32px; text-wrap: balance; }

    /* Filters */
    .filters { background: var(--color-bg-primary); position: sticky; top: 0; z-index: 10; }
    .filter-chips { display: flex; gap: 8px; padding: 12px 16px 8px; overflow-x: auto; }
    .filter-chips::-webkit-scrollbar { display: none; }
    .chip { flex-shrink: 0; padding: 8px 16px; border-radius: var(--radius-full); font-size: 14px; font-weight: 500; border: none; cursor: pointer; transition: all 0.15s; }
    .chip--active { background: var(--color-primary); color: var(--color-text-inverse); }
    .chip--inactive { background: var(--color-bg-tertiary); color: var(--color-text-secondary); }
    .chip--inactive:hover { background: var(--color-border-default); }

    .sub-filters { display: flex; gap: 12px; padding: 0 16px 12px; }
    .segment-group { display: flex; background: var(--color-bg-tertiary); border-radius: var(--radius-md); padding: 2px; }
    .segment { padding: 6px 12px; font-size: 12px; font-weight: 500; color: var(--color-text-secondary); border: none; background: transparent; border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .segment--active { background: var(--color-bg-primary); color: var(--color-primary); box-shadow: var(--shadow-sm); }

    .divider { height: 1px; background: var(--color-border-default); }

    /* Cards */
    .cards { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .card { background: var(--color-bg-primary); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden; cursor: pointer; border: 1px solid var(--color-border-default); }
    .card__image { height: 160px; background: var(--color-bg-tertiary); display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .card__image img { width: 100%; height: 100%; object-fit: cover; }
    .card__image--placeholder { flex-direction: column; gap: 8px; }
    .card__image--placeholder i { font-size: 48px; color: var(--color-text-placeholder); }
    .card__body { padding: 16px; }
    .card__header { display: flex; align-items: center; justify-content: space-between; }
    .card__name { font-size: 18px; font-weight: 600; color: var(--color-text-primary); }
    .card__fav { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; background: none; margin: -10px -10px -10px 0; }
    .card__fav i { font-size: 24px; color: var(--color-text-placeholder); transition: all 0.2s; }
    .card__fav--active i { color: var(--color-primary); }
    .card__meta { font-size: 14px; color: var(--color-text-secondary); margin-top: 6px; font-variant-numeric: tabular-nums; }
    .card__badge { display: inline-flex; align-items: center; gap: 4px; margin-top: 8px; padding: 4px 8px; background: var(--color-bg-tertiary); border-radius: var(--radius-sm); font-size: 12px; color: var(--color-text-secondary); }

    /* Refresh */
    .refresh-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; height: 48px; background: var(--color-bg-secondary); border: 1px solid var(--color-border-default); border-radius: var(--radius-md); cursor: pointer; transition: background 0.15s; }
    .refresh-btn:hover { background: var(--color-bg-tertiary); }
    .refresh-btn i { font-size: 20px; color: var(--color-primary); }
    .refresh-btn span { font-size: 14px; font-weight: 500; color: var(--color-text-secondary); }
    .refresh-btn--exhausted { cursor: not-allowed; }
    .refresh-btn--exhausted i { color: var(--color-text-placeholder); }
    .refresh-btn--exhausted span { color: var(--color-text-placeholder); }
    .refresh-btn--exhausted:hover { background: var(--color-bg-secondary); }

    /* Bottom Tab */
    .tab-bar { background: var(--color-bg-primary); border-top: 1px solid var(--color-border-default); display: flex; justify-content: space-around; padding: 8px 24px 28px; }
    .tab { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; min-width: 44px; min-height: 44px; justify-content: center; text-decoration: none; }
    .tab i { font-size: 24px; }
    .tab span { font-size: 11px; font-weight: 500; }
    .tab--active i, .tab--active span { color: var(--color-primary); }
    .tab--inactive i, .tab--inactive span { color: var(--color-text-placeholder); }

    /* States */
    .state-empty, .state-error { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 64px 16px; gap: 12px; text-align: center; flex: 1; }
    .state-empty i, .state-error i { font-size: 48px; color: var(--color-text-placeholder); }
    .state-empty__title, .state-error__title { font-size: 16px; color: var(--color-text-secondary); line-height: 24px; }
    .state-empty__sub, .state-error__sub { font-size: 14px; color: var(--color-text-placeholder); }
    .state-btn-primary { padding: 12px 24px; background: var(--color-primary); color: var(--color-text-inverse); border: none; border-radius: var(--radius-md); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .state-btn-secondary { padding: 10px 20px; background: transparent; color: var(--color-text-primary); border: 1px solid var(--color-border-default); border-radius: var(--radius-md); font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px; }

    /* Skeleton */
    .skeleton { display: none; flex-direction: column; gap: 12px; padding: 16px; flex: 1; }
    .skeleton .card { pointer-events: none; }
    .skeleton .skel-box { background: var(--color-bg-tertiary); border-radius: var(--radius-sm); position: relative; overflow: hidden; }
    .skeleton .skel-box::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); animation: shimmer 1.5s infinite; }
    @keyframes shimmer { to { left: 100%; } }
    .skel-img { height: 160px; border-radius: var(--radius-lg) var(--radius-lg) 0 0 !important; }
    .skel-line { height: 18px; margin-bottom: 8px; }
    .skel-line--short { width: 60%; }
    .skel-line--long { width: 85%; }

    /* View state toggles */
    .phone.is-loading .skeleton { display: flex; }
    .phone.is-loading .cards { display: none; }
    .phone.is-empty .state-empty { display: flex; }
    .phone.is-empty .cards { display: none; }
    .phone.is-error .state-error { display: flex; }
    .phone.is-error .cards { display: none; }

    /* State Switcher (dev only) */
    .state-switcher { position: fixed; top: 8px; right: 8px; z-index: 1000; display: flex; gap: 4px; }
    .state-switcher button { padding: 4px 8px; font-size: 11px; border: 1px solid var(--color-border-default); border-radius: var(--radius-sm); background: white; cursor: pointer; font-family: inherit; }
    .state-switcher button.active { background: var(--color-primary); color: white; border-color: var(--color-primary); }
  </style>
</head>
<body>
  <!-- State Switcher -->
  <div class="state-switcher">
    <button class="active" onclick="setState('')">정상</button>
    <button onclick="setState('is-loading')">로딩</button>
    <button onclick="setState('is-empty')">빈 상태</button>
    <button onclick="setState('is-error')">에러</button>
  </div>

  <div class="phone" id="phone">
    <!-- Status Bar -->
    <div class="status-bar">
      <span>9:41</span>
      <span style="font-size:12px;">●●●● ▐▐▐▐ 🔋</span>
    </div>

    <!-- App Bar -->
    <div class="app-bar">
      <span class="app-bar__logo">온유어런치</span>
      <div class="app-bar__icon"><i class="ph ph-bell"></i></div>
    </div>

    <!-- Greeting -->
    <div class="greeting">
      <h1>지수님,<br>오늘 점심 뭐 먹을까요?</h1>
    </div>

    <!-- Filters -->
    <div class="filters">
      <div class="filter-chips">
        <button class="chip chip--active">전체</button>
        <button class="chip chip--inactive">한식</button>
        <button class="chip chip--inactive">중식</button>
        <button class="chip chip--inactive">일식</button>
        <button class="chip chip--inactive">양식</button>
        <button class="chip chip--inactive">아시안</button>
        <button class="chip chip--inactive">분식</button>
        <button class="chip chip--inactive">샐러드</button>
      </div>
      <div class="sub-filters">
        <div class="segment-group">
          <button class="segment">5분</button>
          <button class="segment segment--active">10분</button>
          <button class="segment">15분</button>
        </div>
        <div class="segment-group">
          <button class="segment">~1만</button>
          <button class="segment">1~2만</button>
          <button class="segment">2만~</button>
        </div>
      </div>
    </div>
    <div class="divider" style="position:sticky;top:0;z-index:9;"></div>

    <!-- Normal: Cards -->
    <div class="cards">
      <!-- Card 1 -->
      <div class="card">
        <div class="card__image">
          <img src="https://images.unsplash.com/photo-1567521464027-f127ff144326?w=400&h=200&fit=crop" alt="한식" loading="lazy" decoding="async">
        </div>
        <div class="card__body">
          <div class="card__header">
            <span class="card__name">을지로 골목식당</span>
            <button class="card__fav"><i class="ph ph-heart"></i></button>
          </div>
          <p class="card__meta">한식 · 도보 8분 · ~1만원</p>
        </div>
      </div>

      <!-- Card 2 -->
      <div class="card">
        <div class="card__image">
          <img src="https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=400&h=200&fit=crop" alt="양식" loading="lazy" decoding="async">
        </div>
        <div class="card__body">
          <div class="card__header">
            <span class="card__name">파스타공방</span>
            <button class="card__fav card__fav--active"><i class="ph-fill ph-heart"></i></button>
          </div>
          <p class="card__meta">양식 · 도보 5분 · ~1.5만원</p>
          <div class="card__badge">★ 4.5 · 2번 방문</div>
        </div>
      </div>

      <!-- Card 3 -->
      <div class="card">
        <div class="card__image">
          <img src="https://images.unsplash.com/photo-1579871494447-9811cf80d66c?w=400&h=200&fit=crop" alt="일식" loading="lazy" decoding="async">
        </div>
        <div class="card__body">
          <div class="card__header">
            <span class="card__name">스시히로</span>
            <button class="card__fav"><i class="ph ph-heart"></i></button>
          </div>
          <p class="card__meta">일식 · 도보 10분 · ~2만원</p>
        </div>
      </div>

      <!-- Refresh Button -->
      <button class="refresh-btn">
        <i class="ph ph-arrows-clockwise"></i>
        <span>다른 추천 보기 (4/5)</span>
      </button>
    </div>

    <!-- Loading: Skeleton -->
    <div class="skeleton">
      <div class="card">
        <div class="skel-box skel-img"></div>
        <div style="padding:16px;">
          <div class="skel-box skel-line skel-line--long"></div>
          <div class="skel-box skel-line skel-line--short"></div>
        </div>
      </div>
      <div class="card">
        <div class="skel-box skel-img"></div>
        <div style="padding:16px;">
          <div class="skel-box skel-line skel-line--long"></div>
          <div class="skel-box skel-line skel-line--short"></div>
        </div>
      </div>
      <div class="card">
        <div class="skel-box skel-img"></div>
        <div style="padding:16px;">
          <div class="skel-box skel-line skel-line--long"></div>
          <div class="skel-box skel-line skel-line--short"></div>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div class="state-empty">
      <i class="ph ph-bowl-food"></i>
      <p class="state-empty__title">조건에 맞는 식당을 찾지 못했어요</p>
      <p class="state-empty__sub">필터를 바꿔보세요</p>
      <button class="state-btn-secondary">필터 초기화</button>
    </div>

    <!-- Error State -->
    <div class="state-error">
      <i class="ph ph-wifi-slash"></i>
      <p class="state-error__title">인터넷 연결을 확인해주세요</p>
      <button class="state-btn-primary">다시 시도</button>
    </div>

    <!-- Bottom Tab Bar -->
    <div class="tab-bar">
      <a class="tab tab--active" href="home.html">
        <i class="ph-fill ph-house"></i>
        <span>홈</span>
      </a>
      <a class="tab tab--inactive" href="explore.html">
        <i class="ph ph-magnifying-glass"></i>
        <span>탐색</span>
      </a>
      <a class="tab tab--inactive" href="eating-history.html">
        <i class="ph ph-calendar-blank"></i>
        <span>이력</span>
      </a>
      <a class="tab tab--inactive" href="mypage.html">
        <i class="ph ph-user"></i>
        <span>마이</span>
      </a>
    </div>
  </div>

  <script>
    function setState(state) {
      const phone = document.getElementById('phone');
      phone.className = 'phone' + (state ? ' ' + state : '');
      document.querySelectorAll('.state-switcher button').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
