appId: host.exp.Exponent
---
# 핵심 플로우 통합 테스트

# 0. 현재 화면에서 뒤로 가기 (혹시 하위 화면에 있을 경우)
- back
- back

# 1. 홈 탭으로 이동
- tapOn:
    text: "홈, tab, 1 of 4"
    optional: true
- extendedWaitUntil:
    visible: "온유어런치"
    timeout: 15000
- assertVisible: "오늘 점심 뭐 먹을까요?"
- takeScreenshot: "flow_01_home"

# 2. 식당 카드 탭 → 상세
- tapOn:
    text: ".*진미평양냉면.*"
- extendedWaitUntil:
    visible: ".*먹었어요.*"
    timeout: 5000
- assertVisible: "진미평양냉면"
- assertVisible: ".*도보.*"
- takeScreenshot: "flow_02_detail"

# 3. 뒤로 → 홈 복귀 확인
- tapOn: "‹"
- extendedWaitUntil:
    visible: "온유어런치"
    timeout: 10000
- takeScreenshot: "flow_03_back_home"

# 4. 탐색 탭
- tapOn:
    text: "탐색, tab, 2 of 4"
- extendedWaitUntil:
    visible: "식당명, 메뉴 검색"
    timeout: 5000
- assertVisible: ".*명동할머니국수.*"
- takeScreenshot: "flow_04_explore"

# 5. 이력 탭
- tapOn:
    text: "이력, tab, 3 of 4"
- extendedWaitUntil:
    visible: "먹은 이력"
    timeout: 5000
- takeScreenshot: "flow_05_history"

# 6. 마이 탭
- tapOn:
    text: "마이, tab, 4 of 4"
- extendedWaitUntil:
    visible: "마이페이지"
    timeout: 5000
- assertVisible: ".*test@example.com.*"
- takeScreenshot: "flow_06_mypage"
