# ─────────────────────────────────────────
# 온유어런치 API — Railway 배포 설정
# ─────────────────────────────────────────

[build]
# Dockerfile 기반 빌드 (모노레포이므로 src/ 루트에서 빌드)
dockerfilePath = "apps/api/Dockerfile"

[deploy]
# 헬스체크 엔드포인트
healthcheckPath = "/api/health"
healthcheckTimeout = 30

# 재시작 정책
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# 리전 (서울에서 가장 가까운)
# Railway는 us-west, us-east, eu-west, asia-southeast 제공
# 한국 타겟이므로 asia-southeast 선택
