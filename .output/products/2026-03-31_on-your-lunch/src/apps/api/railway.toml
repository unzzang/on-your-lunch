# ─────────────────────────────────────────
# 온유어런치 API — Railway 배포 설정
# ─────────────────────────────────────────

[build]
# Dockerfile 경로 (워크스페이스 루트 기준)
dockerfilePath = "apps/api/Dockerfile"
# Docker build context — 모노레포 루트 (shared-types 접근 필요)
watchPaths = ["apps/api/**", "packages/shared-types/**"]

[deploy]
# 헬스체크 경로
healthcheckPath = "/health"
# 헬스체크 타임아웃 (마이그레이션 실행 시간 고려)
healthcheckTimeout = 120
# 재시작 정책
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
